version: "3.9"

services:
  tictactoe:
    build: .
    image: tictactoe:latest
    container_name: tictactoe
    ports:
      - "10000:10000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:10000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
